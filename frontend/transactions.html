<!DOCTYPE html>
<html lang="en">
<head>
    <script src="theme.js?v=20260531_edge_fixed"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Transactions - Book Matrix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=20260531_edge_fixed">
</head>
<body>

    <aside class="sidebar">
        <div class="brand">BOOK MATRIX</div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="index.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li class="nav-item"><a href="books.html" class="nav-link"><i class="fas fa-book"></i> Books</a></li>
            <li class="nav-item"><a href="users.html" class="nav-link"><i class="fas fa-users"></i> Members</a></li>
            <li class="nav-item"><a href="issue_return.html" class="nav-link"><i class="fas fa-exchange-alt"></i> Borrowed Books</a></li>
            <li class="nav-item"><a href="categories.html" class="nav-link"><i class="fas fa-tags"></i> Categories</a></li>
            <li class="nav-item"><a href="authors.html" class="nav-link"><i class="fas fa-feather"></i> Authors</a></li>
            <li class="nav-item"><a href="publishers.html" class="nav-link"><i class="fas fa-building"></i> Publishers</a></li>
            <li class="nav-item"><a href="transactions.html" class="nav-link active"><i class="fas fa-chart-bar"></i> Reports</a></li>
            <li class="nav-item"><a href="messages.html" class="nav-link"><i class="fas fa-envelope"></i> Messages</a></li>
            <li class="nav-item"><a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
        <div class="profile-mini">
            <div class="profile-avatar"><img src="https://ui-avatars.com/api/?name=Admin+User" alt="Admin"></div>
            <div class="profile-info"><h4>Admin User</h4><p>Online</p></div>
        </div>
    </aside>

    <main class="main-content">
        <nav class="top-nav">
            <h2 style="font-family: 'Cinzel', serif; letter-spacing: 2px;">REPORTS & LOGS</h2>
            <div class="header-actions">
                <button class="action-btn" id="theme-toggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="action-btn" id="bell-btn" title="Notifications">
                    <i class="fas fa-bell"></i>
                </button>
                <button class="action-btn" title="Export CSV"><i class="fas fa-file-export"></i></button>
            </div>
        </nav>

        <div class="section-panel glass-effect">
            <div class="panel-title">Full Transaction History</div>
            <div class="custom-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Tx ID</th>
                            <th>Member</th>
                            <th>Book Title</th>
                            <th>Issue Date</th>
                            <th>Due Date</th>
                            <th>Return Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="txTable">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="app.js?v=20260531_edge_fixed"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('/api?action=get_transactions')
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    data.reverse().forEach(t => {
                        let isReturned = t.actual_return_date ? true : false;
                        let statusClass = isReturned ? 'status-available' : 'status-borrowed';
                        let statusText = isReturned ? 'RETURNED' : 'ISSUED';
                        
                        html += `
                            <tr>
                                <td><span style="font-family: monospace; color: var(--neon-blue);">#${t.id}</span></td>
                                <td style="font-weight: 600;">${t.user}</td>
                                <td>${t.book}</td>
                                <td style="color: var(--text-secondary);">${t.issue_date}</td>
                                <td style="color: var(--text-secondary);">${t.return_date}</td>
                                <td style="color: var(--text-secondary);">${t.actual_return_date || '-'}</td>
                                <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                            </tr>
                        `;
                    });
                    document.getElementById('txTable').innerHTML = html;
                });
        });
    </script>
</body>
</html>
