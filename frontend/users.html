<!DOCTYPE html>
<html lang="en">

<head>
    <script src="theme.js?v=20260531_edge_fixed"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members Management - Book Matrix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=20260531_edge_fixed">
</head>

<body>

    <aside class="sidebar">
        <div class="brand">BOOK MATRIX</div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="index.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
            </li>
            <li class="nav-item"><a href="books.html" class="nav-link"><i class="fas fa-book"></i> Books</a></li>
            <li class="nav-item"><a href="users.html" class="nav-link active"><i class="fas fa-users"></i> Members</a>
            </li>
            <li class="nav-item"><a href="issue_return.html" class="nav-link"><i class="fas fa-exchange-alt"></i>
                    Borrowed Books</a></li>
            <li class="nav-item"><a href="categories.html" class="nav-link"><i class="fas fa-tags"></i> Categories</a>
            </li>
            <li class="nav-item"><a href="authors.html" class="nav-link"><i class="fas fa-feather"></i> Authors</a></li>
            <li class="nav-item"><a href="publishers.html" class="nav-link"><i class="fas fa-building"></i>
                    Publishers</a></li>
            <li class="nav-item"><a href="transactions.html" class="nav-link"><i class="fas fa-chart-bar"></i>
                    Reports</a></li>
            <li class="nav-item"><a href="messages.html" class="nav-link"><i class="fas fa-envelope"></i> Messages</a>
            </li>
            <li class="nav-item"><a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
        <div class="profile-mini">
            <div class="profile-avatar"><img src="https://ui-avatars.com/api/?name=Admin+User" alt="Admin"></div>
            <div class="profile-info">
                <h4>Admin User</h4>
                <p>Online</p>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <nav class="top-nav">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="memberSearchInput" class="search-input" placeholder="Search members by name or email...">
            </div>
            <div class="header-actions">
                <button class="action-btn" id="theme-toggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="action-btn" title="Notifications">
                    <i class="fas fa-bell"></i>
                </button>
                <button class="btn-add" onclick="document.getElementById('addMemberModal').classList.add('active')">
                    <i class="fas fa-user-plus"></i> Add New Member
                </button>
            </div>
        </nav>

        <div class="section-panel glass-effect">
            <div class="panel-title">Library Members</div>
            <div class="custom-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Member Details</th>
                            <th>Email Address</th>
                            <th>Phone Number</th>
                            <th>Role</th>
                            <th>Joined Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="usersTable">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add Member Modal -->
    <div class="modal-overlay" id="addMemberModal">
        <div class="modal">
            <h3><i class="fas fa-user-plus" style="margin-right:10px;"></i>Add New Member</h3>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="search-input" id="newMemberName" placeholder="Enter member's full name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" class="search-input" id="newMemberEmail" placeholder="Enter email address">
            </div>
            <div id="addMemberMsg" class="message"></div>
            <div style="display:flex; gap:15px; margin-top:20px;">
                <button class="btn-add" style="flex:1;" onclick="addNewMember()"><i class="fas fa-save"></i> Save Member</button>
                <button class="action-btn" style="flex:0;" onclick="document.getElementById('addMemberModal').classList.remove('active')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="app.js?v=20260531_edge_fixed"></script>
    <script>
        let allMembers = [];

        document.addEventListener("DOMContentLoaded", () => {
            loadMembers();

            document.getElementById('memberSearchInput').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allMembers.filter(u =>
                    u.name.toLowerCase().includes(term) ||
                    u.email.toLowerCase().includes(term)
                );
                renderMembers(filtered);
            };

            document.getElementById('addMemberModal').addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('active');
            });
        });

        function loadMembers() {
            fetch('/api?action=get_users')
                .then(res => res.json())
                .then(data => {
                    allMembers = data;
                    renderMembers(data);
                });
        }

        function renderMembers(data) {
            let html = '';
            data.forEach(u => {
                html += `
                    <tr>
                        <td>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div class="profile-avatar" style="width: 35px; height: 35px;">
                                    <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(u.name)}&background=9d50bb&color=fff" alt="">
                                </div>
                                <div style="font-weight: 600;">${u.name}</div>
                            </div>
                        </td>
                        <td>${u.email}</td>
                        <td style="color: var(--text-secondary);">+1 (555) 012-${String(u.id).padStart(3,'0')}</td>
                        <td><span class="status-badge" style="background: rgba(0, 210, 255, 0.1); color: var(--neon-blue);">Standard Member</span></td>
                        <td style="color: var(--text-secondary);">Jan 12, 2024</td>
                        <td><span class="status-badge status-available">Active</span></td>
                    </tr>
                `;
            });
            document.getElementById('usersTable').innerHTML = html || '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-secondary);">No members found.</td></tr>';
        }

        function addNewMember() {
            const name = document.getElementById('newMemberName').value.trim();
            const email = document.getElementById('newMemberEmail').value.trim();
            const msgEl = document.getElementById('addMemberMsg');

            if (!name || !email) {
                msgEl.className = 'message error';
                msgEl.style.display = 'block';
                msgEl.innerText = 'Name and Email are required!';
                return;
            }

            fetch(`/api?action=add_user&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        msgEl.className = 'message success';
                        msgEl.style.display = 'block';
                        msgEl.innerText = '✓ Member added successfully!';
                        document.getElementById('newMemberName').value = '';
                        document.getElementById('newMemberEmail').value = '';
                        setTimeout(() => {
                            loadMembers();
                            document.getElementById('addMemberModal').classList.remove('active');
                            msgEl.style.display = 'none';
                        }, 1200);
                    } else {
                        msgEl.className = 'message error';
                        msgEl.style.display = 'block';
                        msgEl.innerText = 'Error: ' + (data.error || 'Unknown error');
                    }
                })
                .catch(() => {
                    msgEl.className = 'message error';
                    msgEl.style.display = 'block';
                    msgEl.innerText = 'Connection error. Is the server running?';
                });
        }
    </script>
</body>

</html>
