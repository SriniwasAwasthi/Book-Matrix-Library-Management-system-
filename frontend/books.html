<!DOCTYPE html>
<html lang="en">

<head>
    <script src="theme.js?v=20260531_edge_fixed"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books Management - Book Matrix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=20260531_edge_fixed">
</head>

<body>

    <aside class="sidebar">
        <div class="brand">BOOK MATRIX</div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="index.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a>
            </li>
            <li class="nav-item"><a href="books.html" class="nav-link active"><i class="fas fa-book"></i> Books</a></li>
            <li class="nav-item"><a href="users.html" class="nav-link"><i class="fas fa-users"></i> Members</a></li>
            <li class="nav-item"><a href="issue_return.html" class="nav-link"><i class="fas fa-exchange-alt"></i>
                    Borrowed Books</a></li>
            <li class="nav-item"><a href="categories.html" class="nav-link"><i class="fas fa-tags"></i> Categories</a>
            </li>
            <li class="nav-item"><a href="authors.html" class="nav-link"><i class="fas fa-feather"></i> Authors</a></li>
            <li class="nav-item"><a href="publishers.html" class="nav-link"><i class="fas fa-building"></i>
                    Publishers</a></li>
            <li class="nav-item"><a href="transactions.html" class="nav-link"><i class="fas fa-chart-bar"></i>
                    Reports</a></li>
            <li class="nav-item"><a href="messages.html" class="nav-link"><i class="fas fa-envelope"></i> Messages</a>
            </li>
            <li class="nav-item"><a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
        <div class="profile-mini">
            <div class="profile-avatar"><img src="https://ui-avatars.com/api/?name=Admin+User" alt="Admin"></div>
            <div class="profile-info">
                <h4>Admin User</h4>
                <p>Online</p>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <nav class="top-nav">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="bookSearch" class="search-input"
                    placeholder="Search by title, author, or category...">
            </div>
            <div class="header-actions">
                <button class="action-btn" id="theme-toggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="action-btn" title="Notifications">
                    <i class="fas fa-bell"></i>
                </button>
                <button class="btn-add" onclick="document.getElementById('addBookModal').classList.add('active')">
                    <i class="fas fa-plus"></i> Add New Book
                </button>
            </div>
        </nav>

        <div class="section-panel glass-effect">
            <div class="panel-title" id="books_title">Books Inventory</div>
            <div class="custom-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Book Details</th>
                            <th>Author</th>
                            <th>Category</th>
                            <th>Publisher</th>
                            <th>Copies</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="booksTable">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add Book Modal -->
    <div class="modal-overlay" id="addBookModal">
        <div class="modal">
            <h3><i class="fas fa-book" style="margin-right:10px;"></i>Add New Book</h3>
            <div class="form-group">
                <label>Book Title</label>
                <input type="text" class="search-input" id="newTitle" placeholder="Enter book title">
            </div>
            <div class="form-group">
                <label>Author</label>
                <input type="text" class="search-input" id="newAuthor" placeholder="Enter author name">
            </div>
            <div class="form-group">
                <label>Category</label>
                <input type="text" class="search-input" id="newCategory" placeholder="e.g. Fiction, Science, History">
            </div>
            <div class="form-group">
                <label>Publisher</label>
                <input type="text" class="search-input" id="newPublisher" placeholder="Enter publisher name">
            </div>
            <div class="form-group">
                <label>Price ($)</label>
                <input type="number" class="search-input" id="newPrice" placeholder="0.00" step="0.01">
            </div>
            <div class="form-group">
                <label>Quantity</label>
                <input type="number" class="search-input" id="newQty" placeholder="Number of copies" min="1">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" class="search-input" id="newDesc" placeholder="Short description">
            </div>
            <div id="addBookMsg" class="message"></div>
            <div style="display:flex; gap:15px; margin-top:20px;">
                <button class="btn-add" style="flex:1;" onclick="addNewBook()"><i class="fas fa-save"></i> Save Book</button>
                <button class="action-btn" style="flex:0;" onclick="document.getElementById('addBookModal').classList.remove('active')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="app.js?v=20260531_edge_fixed"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const filterType = urlParams.get('filter');
            const filterValue = urlParams.get('value');

            if (filterType && filterValue) {
                document.getElementById('books_title').innerText = `Books: ${filterType.charAt(0).toUpperCase() + filterType.slice(1)} - ${filterValue}`;
            }

            fetch('/api?action=get_books')
                .then(res => res.json())
                .then(data => {
                    let filteredData = data;
                    if (filterType && filterValue) {
                        filteredData = data.filter(b => b[filterType] === filterValue);
                    }
                    renderBooks(filteredData);
                });

            document.getElementById('bookSearch').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                fetch('/api?action=get_books')
                    .then(res => res.json())
                    .then(data => {
                        const filtered = data.filter(b =>
                            b.title.toLowerCase().includes(term) ||
                            b.author.toLowerCase().includes(term) ||
                            b.category.toLowerCase().includes(term)
                        );
                        renderBooks(filtered);
                    });
            };

            // Close modal when clicking outside
            document.getElementById('addBookModal').addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('active');
            });
        });

        function renderBooks(books) {
            let html = '';
            if (books.length === 0) {
                html = '<tr><td colspan="7" style="text-align:center; padding: 40px; color: var(--text-secondary);">No books found matching your search.</td></tr>';
            }
            books.forEach(b => {
                const status = b.avail_qty > 0 ? 'status-available' : 'status-borrowed';
                const statusText = b.avail_qty > 0 ? 'Available' : 'Out of Stock';
                html += `
                    <tr>
                        <td>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div class="book-cover-mini" style="background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));"></div>
                                <div>
                                    <div style="font-weight: 600;">${b.title}</div>
                                    <div style="font-size: 11px; color: var(--text-secondary);">ID: #BK-${b.id}</div>
                                </div>
                            </div>
                        </td>
                        <td>${b.author}</td>
                        <td><span class="status-badge" style="background: rgba(157, 80, 187, 0.1); color: var(--neon-purple);">${b.category}</span></td>
                        <td>${b.publisher}</td>
                        <td style="font-weight: 700;">${b.avail_qty} / ${b.total_qty}</td>
                        <td><span class="status-badge ${status}">${statusText}</span></td>
                        <td>
                            <button class="action-btn" title="Edit"><i class="fas fa-edit"></i></button>
                            <button class="action-btn" title="View Details" onclick="location.href='book_details.html?id=${b.id}'"><i class="fas fa-external-link-alt"></i></button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('booksTable').innerHTML = html;
        }

        function addNewBook() {
            const title = document.getElementById('newTitle').value.trim();
            const author = document.getElementById('newAuthor').value.trim();
            const category = document.getElementById('newCategory').value.trim() || 'Uncategorized';
            const publisher = document.getElementById('newPublisher').value.trim() || 'Unknown';
            const price = document.getElementById('newPrice').value || '0';
            const qty = document.getElementById('newQty').value || '1';
            const desc = document.getElementById('newDesc').value.trim();
            const msgEl = document.getElementById('addBookMsg');

            if (!title || !author) {
                msgEl.className = 'message error';
                msgEl.style.display = 'block';
                msgEl.innerText = 'Title and Author are required!';
                return;
            }

            const url = `/api?action=add_book&title=${encodeURIComponent(title)}&author=${encodeURIComponent(author)}&category=${encodeURIComponent(category)}&publisher=${encodeURIComponent(publisher)}&price=${price}&quantity=${qty}&description=${encodeURIComponent(desc)}`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        msgEl.className = 'message success';
                        msgEl.style.display = 'block';
                        msgEl.innerText = '✓ Book added successfully!';
                        // Clear fields
                        ['newTitle','newAuthor','newCategory','newPublisher','newPrice','newQty','newDesc'].forEach(id => document.getElementById(id).value = '');
                        // Refresh table
                        setTimeout(() => {
                            fetch('/api?action=get_books').then(r => r.json()).then(renderBooks);
                            document.getElementById('addBookModal').classList.remove('active');
                            msgEl.style.display = 'none';
                        }, 1200);
                    } else {
                        msgEl.className = 'message error';
                        msgEl.style.display = 'block';
                        msgEl.innerText = 'Error: ' + (data.error || 'Unknown error');
                    }
                })
                .catch(() => {
                    msgEl.className = 'message error';
                    msgEl.style.display = 'block';
                    msgEl.innerText = 'Connection error. Is the server running?';
                });
        }
    </script>
</body>

</html>
