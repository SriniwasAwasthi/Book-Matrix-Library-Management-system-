<!DOCTYPE html>
<html lang="en">
<head>
    <script src="theme.js?v=20260531_edge_fixed"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authors - Book Matrix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=20260531_edge_fixed">
</head>
<body>

    <aside class="sidebar">
        <div class="brand">BOOK MATRIX</div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="index.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li class="nav-item"><a href="books.html" class="nav-link"><i class="fas fa-book"></i> Books</a></li>
            <li class="nav-item"><a href="users.html" class="nav-link"><i class="fas fa-users"></i> Members</a></li>
            <li class="nav-item"><a href="issue_return.html" class="nav-link"><i class="fas fa-exchange-alt"></i> Borrowed Books</a></li>
            <li class="nav-item"><a href="categories.html" class="nav-link"><i class="fas fa-tags"></i> Categories</a></li>
            <li class="nav-item"><a href="authors.html" class="nav-link active"><i class="fas fa-feather"></i> Authors</a></li>
            <li class="nav-item"><a href="publishers.html" class="nav-link"><i class="fas fa-building"></i> Publishers</a></li>
            <li class="nav-item"><a href="transactions.html" class="nav-link"><i class="fas fa-chart-bar"></i> Reports</a></li>
            <li class="nav-item"><a href="messages.html" class="nav-link"><i class="fas fa-envelope"></i> Messages</a></li>
            <li class="nav-item"><a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
        <div class="profile-mini">
            <div class="profile-avatar"><img src="https://ui-avatars.com/api/?name=Admin+User" alt="Admin"></div>
            <div class="profile-info"><h4>Admin User</h4><p>Online</p></div>
        </div>
    </aside>

    <main class="main-content">
        <nav class="top-nav">
            <h2 style="font-family: 'Cinzel', serif; letter-spacing: 2px;">BOOK AUTHORS</h2>
            <div class="header-actions">
                <button class="action-btn" id="theme-toggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="action-btn" id="bell-btn" title="Notifications">
                    <i class="fas fa-bell"></i>
                </button>
            </div>
        </nav>

        <div class="stats-grid" id="author_grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));">
            <!-- Authors will be loaded here -->
        </div>
    </main>

    <script src="app.js?v=20260531_edge_fixed"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch('/api?action=get_authors')
                .then(res => res.json())
                .then(data => {
                    const grid = document.getElementById('author_grid');
                    data.forEach(auth => {
                        const card = document.createElement('div');
                        card.className = 'stat-card glass-effect card-purple';
                        card.style.cursor = 'pointer';
                        card.onclick = () => location.href = `books.html?filter=author&value=${encodeURIComponent(auth)}`;
                        card.innerHTML = `
                            <div class="stat-header">
                                <div class="stat-icon-box"><i class="fas fa-user-edit"></i></div>
                            </div>
                            <div class="stat-value" style="font-size: 1.2rem;">${auth}</div>
                            <div class="stat-label">View Bibliography</div>
                        `;
                        grid.appendChild(card);
                    });
                });
        });
    </script>
</body>
</html>
