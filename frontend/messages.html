<!DOCTYPE html>
<html lang="en">
<head>
    <script src="theme.js?v=20260531_edge_fixed"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Book Matrix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=20260531_edge_fixed">
</head>
<body>

    <aside class="sidebar">
        <div class="brand">BOOK MATRIX</div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="index.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li class="nav-item"><a href="books.html" class="nav-link"><i class="fas fa-book"></i> Books</a></li>
            <li class="nav-item"><a href="users.html" class="nav-link"><i class="fas fa-users"></i> Members</a></li>
            <li class="nav-item"><a href="issue_return.html" class="nav-link"><i class="fas fa-exchange-alt"></i> Borrowed Books</a></li>
            <li class="nav-item"><a href="categories.html" class="nav-link"><i class="fas fa-tags"></i> Categories</a></li>
            <li class="nav-item"><a href="authors.html" class="nav-link"><i class="fas fa-feather"></i> Authors</a></li>
            <li class="nav-item"><a href="publishers.html" class="nav-link"><i class="fas fa-building"></i> Publishers</a></li>
            <li class="nav-item"><a href="transactions.html" class="nav-link"><i class="fas fa-chart-bar"></i> Reports</a></li>
            <li class="nav-item"><a href="messages.html" class="nav-link active"><i class="fas fa-envelope"></i> Messages</a></li>
            <li class="nav-item"><a href="settings.html" class="nav-link"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
        <div class="profile-mini">
            <div class="profile-avatar"><img src="https://ui-avatars.com/api/?name=Admin+User" alt="Admin"></div>
            <div class="profile-info"><h4>Admin User</h4><p>Online</p></div>
        </div>
    </aside>

    <main class="main-content">
        <nav class="top-nav">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="search-conversations" class="search-input" placeholder="Search conversations...">
            </div>
            <div class="header-actions">
                <button class="action-btn" id="theme-toggle"><i class="fas fa-moon"></i></button>
                <button class="btn-add" id="compose-btn"><i class="fas fa-plus"></i> Compose</button>
            </div>
        </nav>

        <div class="dashboard-layout" style="grid-template-columns: 1fr 2fr;">
            <!-- Inbox List -->
            <div class="section-panel glass-effect" style="padding: 0;">
                <div class="panel-title" style="padding: 20px; border-bottom: 1px solid var(--glass-border);">Inbox</div>
                <div class="activity-list" id="inbox-list" style="padding: 10px; max-height: calc(100vh - 270px); overflow-y: auto;">
                    <!-- Populated dynamically by JS -->
                </div>
            </div>

            <!-- Chat View -->
            <div class="section-panel glass-effect" style="display: flex; flex-direction: column; height: calc(100vh - 200px);">
                <div class="panel-title" id="chat-header" style="border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; margin-bottom: 0;">
                    <!-- Populated dynamically by JS -->
                </div>

                <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;">
                    <!-- Populated dynamically by JS -->
                </div>

                <div style="padding-top: 20px; border-top: 1px solid var(--glass-border); display: flex; gap: 15px;">
                    <input type="text" id="chat-input" class="search-input" placeholder="Type your message..." style="width: 100%; padding-left: 20px;">
                    <button id="send-btn" class="btn-add" style="width: 60px; padding: 0;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <!-- Compose Modal -->
        <div id="compose-modal" class="modal-overlay">
            <div class="modal" style="max-width: 450px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h3 style="margin: 0; font-family: var(--font-heading); font-size: 20px; font-weight: 700;">New Conversation</h3>
                    <button class="action-btn" id="close-compose" style="width: 32px; height: 32px; border-radius: 50%;"><i class="fas fa-times"></i></button>
                </div>
                <div class="form-group-premium">
                    <label for="member-search">Search Member</label>
                    <div class="premium-select-wrapper" id="member-select-wrapper">
                        <input type="text" id="member-search" class="premium-search-input" placeholder="Search members by name..." autocomplete="off">
                        <i class="fas fa-chevron-down select-arrow"></i>
                        <div class="premium-panel" id="member-dropdown-list" style="top: 100%; left: 0; right: 0;">
                            <!-- Populated dynamically by JS -->
                        </div>
                    </div>
                </div>
                <div style="margin-top: 25px; display: flex; justify-content: flex-end; gap: 12px;">
                    <button class="action-btn" id="cancel-compose" style="padding: 0 20px; font-size: 14px; font-weight: 600;">Cancel</button>
                    <button class="btn-add" id="start-chat" style="padding: 10px 25px; font-size: 14px; font-weight: 700; height: 44px; display: flex; align-items: center; justify-content: center;">Start Chat</button>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js?v=20260531_edge_fixed"></script>
</body>
</html>
